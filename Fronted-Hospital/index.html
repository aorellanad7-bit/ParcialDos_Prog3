<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital SGTH - Recepción</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans flex h-screen overflow-hidden">

    <aside class="w-64 bg-blue-900 text-white flex flex-col shadow-lg">
        <div class="p-6 text-center border-b border-blue-800">
            <h2 class="text-2xl font-bold">🏥 SGTH</h2>
            <p class="text-sm text-blue-300 mt-1">Recepción de Emergencias</p>
        </div>
        <nav class="flex-1 p-4">
            <ul class="space-y-2">
                <li>
                    <button onclick="cambiarPestana('dashboard')" id="btn-dashboard" class="w-full flex items-center gap-3 px-4 py-3 bg-blue-800 rounded-lg text-left font-medium transition duration-200">
                        📋 Ver Pacientes
                    </button>
                </li>
                <li>
                    <button onclick="cambiarPestana('registro')" id="btn-registro" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-800 rounded-lg text-left font-medium transition duration-200 text-blue-200">
                        ➕ Nuevo Registro
                    </button>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="tab-dashboard" class="block">
            <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-lg shadow-sm border-t-4 border-blue-600">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900">Tablero de Triaje</h1>
                    <p class="text-gray-500 mt-1">Ordenado por prioridad automáticamente</p>
                </div>
                <button onclick="obtenerPacientes()" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded transition duration-200">
                    🔄 Actualizar Datos
                </button>
            </header>

            <div class="bg-white rounded-lg shadow overflow-hidden">
                <table class="min-w-full leading-normal">
                    <thead>
                        <tr class="bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">
                            <th class="px-5 py-4 border-b-2">ID Paciente</th>
                            <th class="px-5 py-4 border-b-2">Nombre</th> <th class="px-5 py-4 border-b-2">Gravedad</th>
                            <th class="px-5 py-4 border-b-2">Gravedad</th>
                            <th class="px-5 py-4 border-b-2">Estado</th>
                            <th class="px-5 py-4 border-b-2">Médico Responsable</th>
                            <th class="px-5 py-4 border-b-2">Fecha Ingreso</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-pacientes">
                        </tbody>
                </table>
                <div id="loading-state" class="text-center py-10 text-gray-500">Cargando pacientes...</div>
            </div>
        </section>

        <section id="tab-registro" class="hidden">
            <header class="mb-8 bg-white p-6 rounded-lg shadow-sm border-t-4 border-green-500">
                <h1 class="text-3xl font-bold text-gray-900">Registrar Nuevo Paciente</h1>
                <p class="text-gray-500 mt-1">Ingrese los datos para la evaluación de triaje</p>
            </header>

            <div class="bg-white rounded-lg shadow p-8 max-w-2xl">
                <div id="alerta-form" class="hidden mb-6 p-4 rounded text-sm font-bold"></div>

                <form id="form-registro" onsubmit="enviarRegistro(event)">
                    <div class="mb-4">
                        <label class="block text-gray-700 font-bold mb-2">Nombre del Paciente:</label>
                        <input type="text" id="nombre" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="mb-4">
                        <label class="block text-gray-700 font-bold mb-2">Síntomas:</label>
                        <textarea id="sintomas" required rows="3" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-gray-700 font-bold mb-2">Gravedad (1-5):</label>
                            <input type="number" id="gravedad" min="1" max="5" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 font-bold mb-2">Carnet del Médico:</label>
                            <input type="text" id="medico" placeholder="Ej. MED-1010" required class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 uppercase">
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                        Registrar Paciente
                    </button>
                </form>
            </div>
        </section>

    </main>
    <script src="script.js"></script>
</body>
</html>
